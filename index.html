<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="214ST W&B">
    <meta name="theme-color" content="#000">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="manifest" href="manifest.json">
    <title>Bell 214ST W&amp;B</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }

        body {
            margin: 0; padding: 0;
            background: #fff;
            color: #000;
            font-family: sans-serif;
            position: fixed; width: 100%; height: 100%;
            overflow-y: auto; -webkit-overflow-scrolling: touch;
        }

        .page {
            width: 100%;
            padding: 12px 10px 30px 10px;
        }

        /* ── Header ── */
        h2 {
            text-align: center;
            margin: 0 0 12px 0;
            font-size: clamp(1rem, 5vw, 1.3rem);
        }

        /* ── Input rows ── */
        .input-block {
            border: 2px solid #000;
            border-radius: 10px;
            margin-bottom: 10px;
            overflow: hidden;
        }

        .input-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px;
            border-bottom: 1px solid #ddd;
            gap: 8px;
        }
        .input-row:last-child { border-bottom: none; }

        .input-label {
            font-size: clamp(0.75rem, 3.5vw, 0.95rem);
            font-weight: bold;
            flex: 1;
        }

        .input-unit {
            font-size: clamp(0.65rem, 2.5vw, 0.8rem);
            color: #666;
            margin-right: 4px;
        }

        .fixed-val {
            font-size: clamp(0.9rem, 4vw, 1.1rem);
            font-weight: bold;
            color: #000;
            min-width: 70px;
            text-align: right;
        }

        input[type="number"] {
            background: #f5f5f5;
            border: 2px solid #000;
            border-radius: 6px;
            color: #000;
            font-family: sans-serif;
            font-size: clamp(0.9rem, 4vw, 1.1rem);
            font-weight: bold;
            padding: 6px 8px;
            text-align: right;
            width: clamp(90px, 28vw, 120px);
            outline: none;
            -webkit-appearance: none;
        }

        /* ── Total weight row (between inputs and slider) ── */
        .total-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px;
            border: 2px solid #000;
            border-radius: 10px;
            margin-bottom: 10px;
        }
        .total-label {
            font-size: clamp(0.75rem, 3.5vw, 0.95rem);
            font-weight: bold;
        }
        .total-val {
            font-size: clamp(1.1rem, 5vw, 1.4rem);
            font-weight: bold;
        }
        .total-val.ok     { color: #008800; }
        .total-val.danger { color: #cc0000; }

        /* ── Warning ── */
        #warn-banner {
            display: none;
            background: #cc0000;
            color: #fff;
            text-align: center;
            padding: 8px 12px;
            border-radius: 8px;
            font-weight: bold;
            font-size: clamp(0.75rem, 3.5vw, 0.9rem);
            margin-bottom: 10px;
        }

        /* ── Fuel slider section ── */
        .fuel-section {
            border: 2px solid #000;
            border-radius: 10px;
            padding: 12px 12px 16px 12px;
            margin-bottom: 10px;
        }

        .fuel-top {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 4px;
        }

        .fuel-title {
            font-size: clamp(0.7rem, 3vw, 0.85rem);
            font-weight: bold;
            text-transform: uppercase;
            color: #666;
        }

        /* Big fuel number shown above thumb */
        .fuel-big {
            font-size: clamp(2rem, 12vw, 3.5rem);
            font-weight: bold;
            text-align: center;
            line-height: 1;
            margin-bottom: 6px;
            letter-spacing: -1px;
        }
        .fuel-big span {
            font-size: clamp(0.8rem, 3vw, 1rem);
            font-weight: normal;
            color: #666;
            margin-left: 4px;
        }

        /* Full-width slider */
        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 8px;
            border-radius: 4px;
            background: #ddd;
            outline: none;
            margin: 0;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #000;
            cursor: pointer;
            border: 3px solid #fff;
            box-shadow: 0 0 0 2px #000;
        }

        .fuel-minmax {
            display: flex;
            justify-content: space-between;
            margin-top: 6px;
            font-size: clamp(0.6rem, 2.5vw, 0.75rem);
            color: #888;
        }

        /* ── Payload results ── */
        .result-section {
            border: 2px solid #000;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .result-title {
            background: #000;
            color: #fff;
            text-align: center;
            padding: 8px;
            font-size: clamp(0.65rem, 2.8vw, 0.8rem);
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .result-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
        }

        .result-item {
            padding: 16px 10px;
            text-align: center;
            border-right: 1px solid #ddd;
        }
        .result-item:last-child { border-right: none; }

        .r-label {
            font-size: clamp(0.65rem, 2.8vw, 0.8rem);
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: block;
            margin-bottom: 4px;
        }

        .r-val {
            font-size: clamp(2rem, 11vw, 3.2rem);
            font-weight: bold;
            display: block;
            line-height: 1;
            letter-spacing: -1px;
        }
        .r-val.ok     { color: #008800; }
        .r-val.warn   { color: #cc7700; }
        .r-val.danger { color: #cc0000; }

        .r-unit {
            font-size: clamp(0.65rem, 2.8vw, 0.8rem);
            color: #888;
            display: block;
            margin-top: 4px;
        }
    </style>
</head>
<body>
<div class="page">

    <h2>BELL 214ST — W&amp;B</h2>

    <!-- Warning -->
    <div id="warn-banner">⚠ OVER MAX GROSS WEIGHT</div>

    <!-- Fixed + editable inputs -->
    <div class="input-block">
        <div class="input-row">
            <span class="input-label">Max Gross</span>
            <span class="input-unit">lbs</span>
            <span class="fixed-val">17,500</span>
        </div>
        <div class="input-row">
            <span class="input-label">Empty Weight</span>
            <span class="input-unit">lbs</span>
            <input type="number" id="empty-weight" value="10000" min="0" max="17500" step="10">
        </div>
        <div class="input-row">
            <span class="input-label">Crew + Gear</span>
            <span class="input-unit">lbs</span>
            <input type="number" id="crew-gear" value="400" min="0" max="2000" step="10">
        </div>
        <div class="input-row">
            <span class="input-label">Basic A/C + Crew</span>
            <span class="input-unit">lbs</span>
            <span class="fixed-val" id="basic-ac">10,400</span>
        </div>
    </div>

    <!-- Total weight -->
    <div class="total-row">
        <span class="total-label">Total Weight (with fuel)</span>
        <div style="display:flex;align-items:baseline;gap:6px;">
            <span class="total-val ok" id="total-weight">--</span>
            <span class="input-unit">lbs</span>
        </div>
    </div>

    <!-- Fuel slider -->
    <div class="fuel-section">
        <div class="fuel-top">
            <span class="fuel-title">Fuel Load</span>
        </div>
        <div class="fuel-big" id="fuel-display">2,000 <span>lbs</span></div>
        <input type="range" id="fuel-slider" min="500" max="3000" step="100" value="2000">
        <div class="fuel-minmax">
            <span>500 lbs</span>
            <span>3,000 lbs</span>
        </div>
    </div>

    <!-- Payload results -->
    <div class="result-section">
        <div class="result-title">Available Payload</div>
        <div class="result-grid">
            <div class="result-item">
                <span class="r-label">Payload</span>
                <span class="r-val ok" id="res-lbs">--</span>
                <span class="r-unit">lbs</span>
            </div>
            <div class="result-item">
                <span class="r-label">Water</span>
                <span class="r-val ok" id="res-liters">--</span>
                <span class="r-unit">liters</span>
            </div>
        </div>
    </div>

</div>

<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
            navigator.serviceWorker.register('./sw.js', { scope: './' })
                .then(function(r) { console.log('SW registered:', r.scope); })
                .catch(function(e) { console.warn('SW failed:', e); });
        });
    }

    var MAX_GROSS   = 17500;
    var emptyInput  = document.getElementById('empty-weight');
    var crewInput   = document.getElementById('crew-gear');
    var fuelSlider  = document.getElementById('fuel-slider');
    var basicAcSpan = document.getElementById('basic-ac');
    var fuelDisplay = document.getElementById('fuel-display');
    var totalWtEl   = document.getElementById('total-weight');
    var warnBanner  = document.getElementById('warn-banner');
    var resLbs      = document.getElementById('res-lbs');
    var resLiters   = document.getElementById('res-liters');

    function fmt(n) {
        return Math.round(n).toLocaleString();
    }

    // 1 lb water = 0.4536 liters (density of water ~1 kg/L, 1 lb = 0.4536 kg)
    function lbsToLiters(lbs) {
        return Math.round(lbs * 0.4536);
    }

    function update() {
        var empty   = parseFloat(emptyInput.value) || 0;
        var crew    = parseFloat(crewInput.value)  || 0;
        var fuel    = parseFloat(fuelSlider.value) || 0;
        var basic   = empty + crew;
        var total   = basic + fuel;
        var payload = MAX_GROSS - total;

        // Basic A/C
        basicAcSpan.textContent = fmt(basic);

        // Fuel display (big number above slider)
        fuelDisplay.innerHTML = fmt(fuel) + ' <span>lbs</span>';

        // Total weight
        totalWtEl.textContent = fmt(total);
        if (total > MAX_GROSS) {
            totalWtEl.className = 'total-val danger';
            warnBanner.style.display = 'block';
        } else {
            totalWtEl.className = 'total-val ok';
            warnBanner.style.display = 'none';
        }

        // Payload colour
        var cls = payload < 0 ? 'r-val danger' : (payload < 500 ? 'r-val warn' : 'r-val ok');

        resLbs.textContent    = payload < 0 ? 'OVER' : fmt(payload);
        resLbs.className      = cls;

        resLiters.textContent = payload < 0 ? '--' : lbsToLiters(payload);
        resLiters.className   = cls;
    }

    fuelSlider.addEventListener('input', update);
    emptyInput.addEventListener('input', update);
    crewInput.addEventListener('input',  update);

    update();
</script>
</body>
</html>
