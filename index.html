<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="HeliTimer">
    <meta name="theme-color" content="#000000">
    <link rel="apple-touch-icon" href="timer.png">
    <link rel="manifest" href="manifest.json">
    <title>HeliTimer v1.35</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body { margin: 0; padding: 0; background: #fff; color: #000; font-family: sans-serif; position: fixed; width: 100%; height: 100%; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .page { width: 100%; padding: 12px 10px 30px 10px; }
        #flight-page { display: none; background: #f0f0f0; min-height: 100vh; }

        /* --- Page 1 Styles --- */
        h2 { text-align: center; margin: 0 0 12px 0; font-size: clamp(1rem, 5vw, 1.3rem); }
        .input-block { border: 2px solid #000; border-radius: 10px; margin-bottom: 10px; overflow: hidden; background: #fff; }
        .input-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; border-bottom: 1px solid #ddd; gap: 8px; }
        .input-label { font-size: clamp(0.75rem, 3.5vw, 0.95rem); font-weight: bold; flex: 1; }
        .input-unit { font-size: clamp(0.65rem, 2.5vw, 0.8rem); color: #666; margin-right: 4px; }
        .fixed-val { font-size: clamp(0.9rem, 4vw, 1.1rem); font-weight: bold; color: #000; min-width: 70px; text-align: right; }
        input[type="number"] { background: #f5f5f5; border: 2px solid #000; border-radius: 6px; color: #000; font-family: sans-serif; font-size: clamp(0.9rem, 4vw, 1.1rem); font-weight: bold; padding: 6px 8px; text-align: right; width: clamp(90px, 28vw, 120px); outline: none; }
        .total-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; border: 2px solid #000; border-radius: 10px; margin-bottom: 10px; background: #fff; }
        .total-val { font-size: clamp(1.1rem, 5vw, 1.4rem); font-weight: bold; }
        .total-val.ok { color: #008800; }
        .total-val.danger { color: #cc0000; }
        .fuel-section { border: 2px solid #000; border-radius: 10px; padding: 12px 12px 16px 12px; margin-bottom: 10px; background: #fff; }
        .fuel-big { font-size: clamp(2.5rem, 15vw, 4rem); font-weight: bold; text-align: center; line-height: 1; margin-bottom: 10px; letter-spacing: -1px; }
        .fuel-big span { font-size: clamp(1rem, 4vw, 1.2rem); font-weight: normal; color: #666; }

        /* --- Page 2 Styles --- */
        .full-bubble { border: 2px solid #000; border-radius: 12px; margin-bottom: 12px; background: #fff; overflow: hidden; padding: 15px; text-align: center; }
        .label-sm { font-size: 0.8rem; font-weight: bold; color: #666; text-transform: uppercase; display: block; margin-bottom: 4px; }
        .val-lg { font-size: 3.2rem; font-weight: bold; display: block; line-height: 1; letter-spacing: -1px; }
        .val-sm-readout { font-size: 1.8rem; font-weight: bold; display: block; line-height: 1; }
        .val-lg.ok, .val-sm-readout.ok { color: #008800; }
        .val-lg.danger, .val-sm-readout.danger { color: #cc0000; }

        /* Controls */
        input[type="range"] { -webkit-appearance: none; width: 100%; height: 18px; border-radius: 9px; background: #ddd; outline: none; margin: 20px 0; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 48px; height: 48px; border-radius: 50%; background: #000; border: 3px solid #fff; box-shadow: 0 0 0 2px #000; }
        select { background: #f5f5f5; border: 2px solid #000; border-radius: 6px; color: #000; font-size: 0.9rem; font-weight: bold; padding: 6px; outline: none; }
        .timer-display { font-size: 4.5rem; font-weight: bold; text-align: center; font-family: monospace; margin-bottom: 10px; letter-spacing: -3px; }
        .btn-go { width: 100%; background: #000; color: #fff; border: none; padding: 22px; font-size: 1.5rem; font-weight: bold; border-radius: 12px; margin-top: 10px; }
        .btn-hdr { background: #444; color: #fff; border: 2px solid #000; padding: 8px 12px; border-radius: 8px; font-weight: bold; font-size: 0.8rem; }
        .header-strip { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; gap: 5px; }
    </style>
</head>
<body>

<div id="calc-page" class="page">
    <h2>214ST W&amp;B</h2>
    <div class="input-block">
        <div class="input-row"><span class="input-label">Max Gross</span><span class="input-unit">lbs</span><span class="fixed-val">17,500</span></div>
        <div class="input-row"><span class="input-label">Empty Weight</span><span class="input-unit">lbs</span><input type="number" id="empty-weight" value="10000"></div>
        <div class="input-row"><span class="input-label">Crew + Gear</span><span class="input-unit">lbs</span><input type="number" id="crew-gear" value="400"></div>
    </div>
    <div class="total-row">
        <span class="total-label">Total Weight</span>
        <span class="total-val ok" id="total-weight">--</span>
    </div>
    <div class="fuel-section">
        <div class="fuel-big" id="fuel-display">Fuel 2,000 <span>lbs</span></div>
        <input type="range" id="fuel-slider" min="500" max="3000" step="50" value="2000">
    </div>
    <button class="btn-go" onclick="showFlightPage()">GO FLY</button>
</div>

<div id="flight-page" class="page">
    <div class="header-strip">
        <div style="display:flex; gap:4px;">
            <button class="btn-hdr" onclick="showCalcPage()">BACK</button>
            <button class="btn-hdr" id="btn-connect" onclick="toggleGPS()" style="background:#007bff;">CONNECT</button>
        </div>
        <div style="display:flex; align-items:center; gap:4px;">
            <select id="burn-rate-select">
                <option value="600">600</option><option value="800" selected>800</option><option value="1000">1000</option>
            </select>
            <select id="gps-refresh">
                <option value="1000">1s</option><option value="2000" selected>2s</option><option value="5000">5s</option>
            </select>
        </div>
    </div>

    <div class="timer-display" id="flight-timer">00:00:00</div>

    <div class="full-bubble">
        <span class="label-sm">Active Fuel Load</span>
        <span class="val-lg" id="fly-fuel-lbs">-- lbs</span>
        <input type="range" id="fly-fuel-slider" min="500" max="3000" step="50">
    </div>

    <div class="full-bubble">
        <span class="label-sm">Payload lbs</span>
        <span class="val-sm-readout ok" id="fly-lbs">-- lbs</span>
    </div>

    <div class="full-bubble">
        <span class="label-sm">Payload Ltr</span>
        <span class="val-lg ok" id="fly-ltr">-- Ltr</span>
    </div>

    <div class="full-bubble" style="background:#000; color:#0f0; border-color:#0f0;">
        <span class="label-sm" style="color:#0f0;">GPS Ground Speed</span>
        <span class="val-lg" id="gps-speed">000</span>
        <span class="label-sm" style="color:#0f0; margin-top:5px;">KNOTS</span>
    </div>
</div>

<script>
    var MAX_GROSS = 17500;
    var gpsWatchID = null;

    // Elements
    var fuelSlider = document.getElementById('fuel-slider'), totalWtEl = document.getElementById('total-weight'), fuelDisplay = document.getElementById('fuel-display');
    var flyFuelSlider = document.getElementById('fly-fuel-slider'), flyFuelLbs = document.getElementById('fly-fuel-lbs');
    var flyLbs = document.getElementById('fly-lbs'), flyLtr = document.getElementById('fly-ltr'), timerEl = document.getElementById('flight-timer');
    var speedEl = document.getElementById('gps-speed'), btnConnect = document.getElementById('btn-connect');

    var flightStartTime = null, burnReferenceTime = null, currentFlightFuel = 0, timerInterval = null;

    function fmt(n) { return Math.round(n).toLocaleString(); }
    function lbsToLiters(lbs) { return Math.round(lbs * 0.4536); }

    function update() {
        var fuel = parseFloat(fuelSlider.value);
        var total = 10400 + fuel;
        fuelDisplay.innerHTML = 'Fuel ' + fmt(fuel) + ' <span>lbs</span>';
        totalWtEl.textContent = fmt(total) + ' lbs';
        totalWtEl.className = total > MAX_GROSS ? 'total-val danger' : 'total-val ok';
    }

    function showFlightPage() {
        document.getElementById('calc-page').style.display = 'none';
        document.getElementById('flight-page').style.display = 'block';
        flightStartTime = Date.now(); burnReferenceTime = Date.now();
        currentFlightFuel = parseFloat(fuelSlider.value);
        flyFuelSlider.value = currentFlightFuel;
        timerInterval = setInterval(tick, 1000);
    }

    function showCalcPage() {
        clearInterval(timerInterval);
        if(gpsWatchID) toggleGPS();
        document.getElementById('flight-page').style.display = 'none';
        document.getElementById('calc-page').style.display = 'block';
    }

    function tick() {
        var now = Date.now();
        var sec = Math.floor((now - flightStartTime) / 1000);
        timerEl.textContent = new Date(sec * 1000).toISOString().substr(11, 8);

        var burnRate = parseFloat(document.getElementById('burn-rate-select').value);
        var elapsedHrs = (now - burnReferenceTime) / 3600000;
        currentFlightFuel = Math.max(500, currentFlightFuel - (elapsedHrs * burnRate));
        burnReferenceTime = now;
        
        flyFuelSlider.value = currentFlightFuel;
        updateFlightDisplay();
    }

    function updateFlightDisplay() {
        var fuel = currentFlightFuel;
        var payload = MAX_GROSS - (10400 + fuel);
        flyFuelLbs.textContent = fmt(fuel) + ' lbs';
        flyLbs.textContent = payload < 0 ? 'OVER' : fmt(payload) + ' lbs';
        flyLtr.textContent = payload < 0 ? '-- Ltr' : fmt(lbsToLiters(payload)) + ' Ltr';
    }

    function toggleGPS() {
        if (!gpsWatchID) {
            btnConnect.textContent = "SEARCHING...";
            gpsWatchID = navigator.geolocation.watchPosition(function(pos) {
                var knots = (pos.coords.speed || 0) * 1.94384;
                speedEl.textContent = Math.round(knots).toString().padStart(3, '0');
                btnConnect.textContent = "DISCONNECT";
                btnConnect.style.background = "#dc3545";
            }, function() { alert("GPS Error"); }, { enableHighAccuracy: true });
        } else {
            navigator.geolocation.clearWatch(gpsWatchID);
            gpsWatchID = null;
            speedEl.textContent = "000";
            btnConnect.textContent = "CONNECT";
            btnConnect.style.background = "#007bff";
        }
    }

    fuelSlider.addEventListener('input', update);
    flyFuelSlider.addEventListener('input', function() {
        currentFlightFuel = parseFloat(flyFuelSlider.value);
        burnReferenceTime = Date.now();
        updateFlightDisplay();
    });
    update();
</script>
</body>
</html>
